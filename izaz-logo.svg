<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="#1C1C1A"/>

  <!-- Subtle inner ring -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="#3A3A36" stroke-width="1"/>

  <!-- Monogram: I S -->
  <g clip-path="url(#circleClip)">
    <text x="256" y="300" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="220" font-weight="500"
          letter-spacing="-8"
          fill="#F4F1E9">IS</text>
  </g>

  <!-- Thin baseline rule under mark -->
  <line x1="176" y1="336" x2="336" y2="336" stroke="#D8A24A" stroke-width="4"/>
</svg>
